services:
  cerbai:
    build: .
    image: ghcr.io/thomas-illiet/cerbai:latest
    ports:
      - "8085:8085"
    environment:
      CERBAI_LISTEN_ADDR: ":8085"
      CERBAI_LLM_URL: ${CERBAI_LLM_URL}
      CERBAI_TOKEN_ENDPOINT: ${CERBAI_TOKEN_ENDPOINT}
      CERBAI_CLIENT_ID: ${CERBAI_CLIENT_ID}
      CERBAI_CLIENT_SECRET: ${CERBAI_CLIENT_SECRET}
      CERBAI_TLS_CERT_FILE: /etc/certs/client.crt
      CERBAI_TLS_KEY_FILE: /etc/certs/client.key
      CERBAI_TLS_CA_FILE: /etc/certs/ca.crt
      CERBAI_REDIS_URL: redis://redis:6379/0
      CERBAI_TOKEN_CACHE_TTL: ${CERBAI_TOKEN_CACHE_TTL:-5m}
    volumes:
      - ./certs:/etc/certs:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    # Disable persistence — token cache is ephemeral by design.
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-server:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.23-alpine AS builder
        WORKDIR /src
        COPY go.mod go.sum ./
        RUN go mod download
        COPY . .
        RUN go build -o /mock-server ./tests/perf/mock_server
        FROM alpine:3.21
        COPY --from=builder /mock-server /mock-server
        ENTRYPOINT ["/mock-server"]
    command: ["--addr", ":9090"]
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  k6:
    image: grafana/k6:latest
    profiles: ["perf"]
    volumes:
      - ./tests/perf/k6:/scripts:ro
    environment:
      PROXY_URL: ${PROXY_URL:-http://cerbai:8085}
      PROXY_TOKEN: ${PROXY_TOKEN:-}
    depends_on:
      cerbai:
        condition: service_healthy
      mock-server:
        condition: service_healthy
